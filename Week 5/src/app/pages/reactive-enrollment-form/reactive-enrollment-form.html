<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <label>Student Name</label><br>

  <input
    type="text"
    formControlName="studentName">

  <br><br>

  <label>Email</label><br>

  <input
    type="email"
    formControlName="studentEmail">

  <br><br>
  <br>

<span
  *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"
  style="color:red">

  Email is already taken.

</span>

<br><br>

  <label>Course ID</label><br>

  <input
    type="number"
    formControlName="courseId">

  <br><br>
  <br>

<span
  *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
  style="color:red">

  Course code starting with XX is not allowed.

</span>

<br><br>

  <label>Preferred Semester</label><br>

  <select formControlName="preferredSemester">

    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

  </select>

  <br><br>

  <label>

    <input
      type="checkbox"
      formControlName="agreeToTerms">

    I agree to the Terms & Conditions

  </label>

  <br><br>

  <hr>

<h3>Additional Courses</h3>

<button
  type="button"
  (click)="addCourse()">

  Add Another Course

</button>

<br><br>

<div
  *ngFor="let ctrl of additionalCourses.controls; let i = index">

  <input
    [formControl]="ctrl"
    placeholder="Additional Course">

  <button
    type="button"
    (click)="removeCourse(i)">

    Remove

  </button>

  <br><br>

</div>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>
